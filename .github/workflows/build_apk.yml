name: Build and Release Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release
          VERSION=$(grep 'version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mete-marcha-v$VERSION.apk
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mete-marcha.apk

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk,build/app/outputs/flutter-apk/mete-marcha.apk,build/app/outputs/flutter-apk/mete-marcha-v${{ env.APP_VERSION }}.apk"
          tag: "latest"
          name: "Latest Release (Automated Build)"
          body: "This release is automatically updated with the latest compiled APK on every commit to the main branch."
          allowUpdates: true
          makeLatest: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
